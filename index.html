<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Математический тренажёр</title>
    <style>
        :root {
            --primary: #4361ee;
            --danger: #e63946;
            --success: #2a9d8f;
            --bg: #f8f9fa;
            --card: #ffffff;
            --text: #212529;
            --border: #dee2e6;
        }
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #e9ecef 0%, #f8f9fa 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 650px;
            background: var(--card);
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1), 0 1px 3px rgba(0,0,0,0.05);
            padding: 40px;
        }
        h1 {
            text-align: center;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 30px;
            font-size: 28px;
            letter-spacing: -0.5px;
        }
        .task-selector {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
        }
        .task-option {
            position: relative;
        }
        .task-option input {
            display: none;
        }
        .task-option label {
            display: block;
            padding: 10px 24px;
            border-radius: 30px;
            background: #f1f3f5;
            color: #495057;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
            user-select: none;
        }
        .task-option input:checked + label {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 10px rgba(67, 97, 238, 0.3);
        }
        .action-btn {
            display: block;
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            background: var(--primary);
            color: white;
            margin-bottom: 25px;
            letter-spacing: 0.3px;
        }
        .action-btn:hover {
            background: #3a56d4;
            transform: translateY(-1px);
            box-shadow: 0 8px 20px rgba(67, 97, 238, 0.3);
        }
        .action-btn:active {
            transform: translateY(0);
        }
        .action-btn:disabled {
            background: #adb5bd;
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }

        /* Стили для матриц в LaTeX-стиле */
        .matrix-container {
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 20px 0;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .matrix-container.visible {
            opacity: 1;
        }
        .matrix-bracket-wrapper {
            display: flex;
            align-items: stretch;
            position: relative;
        }
        .bracket {
            width: 8px;
            background: #2b2d42;
            border-radius: 4px;
        }
        .bracket.left {
            margin-right: 6px;
        }
        .bracket.right {
            margin-left: 6px;
        }
        .matrix-table {
            display: table;
            border-collapse: collapse;
        }
        .matrix-row {
            display: table-row;
        }
        .matrix-cell {
            display: table-cell;
            padding: 8px 14px;
            text-align: center;
            font-weight: 500;
            font-size: 18px;
            color: #2b2d42;
        }
        /* Вертикальная черта для расширенной матрицы */
        .augmented-separator {
            display: table-cell;
            width: 2px;
            background: #2b2d42;
            margin: 0 4px;
        }

        /* Блок для вектора свободных членов (СЛАУ) */
        .vector-eq {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-left: 15px;
            font-size: 20px;
            font-weight: 500;
            color: #2b2d42;
        }
        .vector-bracket {
            display: flex;
            flex-direction: column;
            justify-content: center;
            margin-left: 5px;
        }
        .vector-item {
            padding: 4px 10px;
            border-bottom: 1px solid transparent;
        }

        /* Ответный блок */
        .answer-section {
            display: none;
            margin-top: 20px;
            text-align: center;
        }
        .answer-section.visible {
            display: block;
        }
        .input-group {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 15px;
        }
        .answer-input {
            padding: 10px 15px;
            border: 2px solid var(--border);
            border-radius: 10px;
            font-size: 16px;
            width: 200px;
            text-align: center;
            transition: border-color 0.2s;
        }
        .answer-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(67, 97, 238, 0.1);
        }
        .hint {
            font-size: 14px;
            color: #6c757d;
            margin: 5px 0;
        }
        .check-btn {
            padding: 10px 30px;
            border: none;
            border-radius: 10px;
            background: var(--success);
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .check-btn:hover {
            background: #238b7a;
        }
        .check-btn:disabled {
            background: #adb5bd;
            cursor: not-allowed;
        }
        .result-msg {
            margin-top: 15px;
            font-size: 18px;
            font-weight: 600;
            display: inline-block;
            padding: 8px 20px;
            border-radius: 30px;
        }
        .result-msg.success {
            background: #d4edda;
            color: #155724;
        }
        .result-msg.error {
            background: #f8d7da;
            color: #721c24;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧮 Матричный тренажёр</h1>
        
        <div class="task-selector">
            <div class="task-option">
                <input type="radio" name="taskType" id="det" value="determinant" checked>
                <label for="det">Определитель</label>
            </div>
            <div class="task-option">
                <input type="radio" name="taskType" id="slau" value="slau">
                <label for="slau">СЛАУ</label>
            </div>
        </div>

        <button id="generateBtn" class="action-btn">Сгенерировать задание</button>
        
        <div id="taskDisplay" class="matrix-container"></div>
        
        <div id="answerBlock" class="answer-section">
            <div class="input-group">
                <input type="text" id="answerInput" class="answer-input" placeholder="Введите ответ">
                <button id="checkBtn" class="check-btn">Проверить</button>
            </div>
            <div id="hintText" class="hint">Для СЛАУ введите корни через пробел: x1 x2 x3</div>
            <div id="resultMessage"></div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8000';
        let currentTask = null; // { id, type, question }

        const generateBtn = document.getElementById('generateBtn');
        const taskDisplay = document.getElementById('taskDisplay');
        const answerBlock = document.getElementById('answerBlock');
        const answerInput = document.getElementById('answerInput');
        const checkBtn = document.getElementById('checkBtn');
        const hintText = document.getElementById('hintText');
        const resultMessage = document.getElementById('resultMessage');
        const detRadio = document.getElementById('det');
        const slauRadio = document.getElementById('slau');

        function getSelectedTaskType() {
            return detRadio.checked ? 'determinant' : 'slau';
        }

        // Функция генерации задания
        generateBtn.addEventListener('click', async () => {
            const type = getSelectedTaskType();
            generateBtn.disabled = true;
            generateBtn.textContent = 'Генерируем...';
            taskDisplay.classList.remove('visible');
            taskDisplay.innerHTML = '';
            answerBlock.classList.remove('visible');
            resultMessage.textContent = '';
            answerInput.value = '';

            try {
                let url, params;
                if (type === 'determinant') {
                    url = `${API_BASE}/tasks/determinant`;
                    params = new URLSearchParams({ matrix_width: 3, matrix_height: 3 });
                } else {
                    url = `${API_BASE}/tasks/slau`;
                    params = new URLSearchParams({ variables: 3 });
                }
                
                const response = await fetch(`${url}?${params}`, { method: 'POST' });
                if (!response.ok) {
                    const err = await response.json();
                    throw new Error(err.detail || 'Ошибка генерации');
                }
                const data = await response.json();
                currentTask = {
                    id: data.task_id || data.task_uuid, // зависит от типа, но ключ один
                    type: type,
                    question: data.question
                };

                renderTask(type, data.question);
                taskDisplay.classList.add('visible');
                answerBlock.classList.add('visible');
                answerInput.focus();
                
                // Подсказка для ввода
                if (type === 'slau') {
                    hintText.style.display = 'block';
                    answerInput.placeholder = 'x1 x2 x3';
                } else {
                    hintText.style.display = 'none';
                    answerInput.placeholder = 'Введите число';
                }
            } catch (err) {
                alert('Ошибка: ' + err.message);
            } finally {
                generateBtn.disabled = false;
                generateBtn.textContent = 'Сгенерировать задание';
            }
        });

        function renderTask(type, question) {
            let html = '';
            if (type === 'determinant') {
                // вопрос - двумерный массив
                html = createMatrixBracket(question);
            } else {
                // СЛАУ: question.coefficients (матрица), question.biases (вектор)
                const coeff = question.coefficients;
                const biases = question.biases;
                // Покажем расширенную матрицу [A | b]
                html = createAugmentedMatrix(coeff, biases);
            }
            taskDisplay.innerHTML = html;
        }

        function createMatrixBracket(matrix) {
            const rows = matrix.map(row => 
                `<div class="matrix-row">${row.map(cell => 
                    `<div class="matrix-cell">${cell}</div>`
                ).join('')}</div>`
            ).join('');
            
            return `
                <div class="matrix-bracket-wrapper">
                    <div class="bracket left"></div>
                    <div class="matrix-table">${rows}</div>
                    <div class="bracket right"></div>
                </div>
            `;
        }

        function createAugmentedMatrix(coeff, biases) {
            const numRows = coeff.length;
            let rowsHtml = '';
            for (let i = 0; i < numRows; i++) {
                const rowCells = coeff[i].map(c => `<div class="matrix-cell">${c}</div>`).join('');
                // Столбец свободных членов, biases[i] - это массив из одного элемента или просто число?
                const biasVal = Array.isArray(biases[i]) ? biases[i][0] : biases[i];
                rowsHtml += `<div class="matrix-row">
                    ${rowCells}
                    <div class="augmented-separator"></div>
                    <div class="matrix-cell">${biasVal}</div>
                </div>`;
            }
            return `
                <div class="matrix-bracket-wrapper">
                    <div class="bracket left"></div>
                    <div class="matrix-table">${rowsHtml}</div>
                    <div class="bracket right"></div>
                </div>
            `;
        }

        // Проверка ответа
        checkBtn.addEventListener('click', async () => {
            if (!currentTask) return;
            const rawValue = answerInput.value.trim();
            if (!rawValue) {
                showResult('Введите ответ', false, false);
                return;
            }

            let value;
            const type = currentTask.type;
            if (type === 'determinant') {
                const num = parseFloat(rawValue);
                if (isNaN(num)) {
                    showResult('Нужно число', false, false);
                    return;
                }
                value = num;
            } else {
                // Парсим список чисел через пробел и/или запятую
                const parts = rawValue.split(/[\s,]+/).filter(s => s.length > 0);
                const nums = parts.map(Number);
                if (nums.some(isNaN)) {
                    showResult('Введите числа через пробел', false, false);
                    return;
                }
                // Ожидаем столько же значений, сколько переменных (3)
                if (nums.length !== 3) {
                    showResult('Должно быть 3 корня', false, false);
                    return;
                }
                value = nums;
            }

            checkBtn.disabled = true;
            checkBtn.textContent = 'Проверяем...';

            try {
                const response = await fetch(`${API_BASE}/answers/${currentTask.id}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ value: value })
                });
                if (!response.ok) {
                    const err = await response.json();
                    throw new Error(err.detail || 'Ошибка');
                }
                const result = await response.json();
                showResult(result.ok ? '✅ Правильно!' : '❌ Неверно, попробуйте ещё', result.ok, false);
            } catch (err) {
                showResult('⚠️ ' + err.message, false, true);
            } finally {
                checkBtn.disabled = false;
                checkBtn.textContent = 'Проверить';
            }
        });

        function showResult(text, isSuccess, isError) {
            resultMessage.textContent = text;
            resultMessage.className = 'result-msg';
            if (isSuccess) resultMessage.classList.add('success');
            else if (!isError) resultMessage.classList.add('error');
            // если isError — просто текст без специального фона
        }
    </script>
</body>
</html>
